name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push base image
        run: |
          BASE_IMAGE=ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')/easy-ci-cd:deps
          docker build -f Dockerfile.base -t $BASE_IMAGE .
          docker push $BASE_IMAGE

  build:
    runs-on: ubuntu-latest
    needs: build-base
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push final image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          BASE_IMAGE=ghcr.io/${OWNER}/easy-ci-cd:deps
          IMAGE=ghcr.io/${OWNER}/easy-ci-cd:latest
          docker build --build-arg BASE_IMAGE=$BASE_IMAGE -t $IMAGE .
          docker push $IMAGE

  test:
    runs-on: ubuntu-latest
    needs: build-base
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          BASE_IMAGE=ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')/easy-ci-cd:deps
          docker run --rm -v $(pwd):/app -w /app $BASE_IMAGE php vendor/bin/phpunit

  deploy:
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - name: Deploy
        run: echo "Деплой выполнен"