stages:
  - build-base
  - build
  - test
  - deploy

variables:
  BASE_IMAGE: $CI_REGISTRY_IMAGE:deps

build-base:
  stage: build-base
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  tags:
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f Dockerfile.base -t $BASE_IMAGE .
    - docker push $BASE_IMAGE
  only:
    - master

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  tags:
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --build-arg BASE_IMAGE=$BASE_IMAGE -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - master

test:
  stage: test
  image: $BASE_IMAGE
  tags:
    - docker
  before_script:
    - composer install --no-scripts --no-interaction
  script:
    - php vendor/bin/phpunit
  only:
    - master

deploy:
  stage: deploy
  image: docker:latest
  tags:
    - docker
  variables:
    DOCKER_HOST: "ssh://${SERVER_USER}@${SERVER_HOST}"
  before_script:
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - eval $(ssh-agent -s)
    - echo "${SSH_PRIVATE_KEY}" | tr -d '\r' | ssh-add -
    - '[[ -f /.dockerenv || -d /run/secrets/kubernetes.io/serviceaccount ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker compose pull
    - docker compose down --timeout=60 --remove-orphans
    - docker compose up --detach
    - docker image prune -f || true
  only:
    - master